<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resourcing</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
:root {
  --bg: #171719; --surface: #1f1f24; --elevated: #26262c;
  --border: #2a2a2f; --border-subtle: #35353c;
  --heading: #f0eff5; --subheading: #c8c8d0; --body: #8a8a95; --muted: #6b6b78; --disabled: #44444f;
  --accent: #7c8ae5; --accent-tint: rgba(124,138,229,0.1); --accent-border: rgba(124,138,229,0.18);
  --green: #5b9a7a; --green-tint: rgba(91,154,122,0.1);
  --amber: #e0a05f; --amber-tint: rgba(224,160,95,0.12); --amber-border: rgba(224,160,95,0.18);
  --rose: #d46b6b; --rose-tint: rgba(212,107,107,0.12);
  --text-xs: 11px; --text-sm: 13px; --text-base: 14px; --text-lg: 18px; --text-xl: 24px;
}
html.light {
  --bg: #faf9f7; --surface: #ffffff; --elevated: #f5f4f2;
  --border: #e8e6e3; --border-subtle: #d5d3d0;
  --heading: #1a1a1f; --subheading: #4a4a55; --body: #6b6b78; --muted: #9a9aa5;
  --accent: #5560c0; --accent-tint: rgba(85,96,192,0.08); --accent-border: rgba(85,96,192,0.15);
  --green: #3d8a5e; --green-tint: rgba(61,138,94,0.08);
  --amber: #c49040; --amber-tint: rgba(196,144,64,0.1); --amber-border: rgba(196,144,64,0.15);
  --rose: #c44e4e; --rose-tint: rgba(196,78,78,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--body); font-family: 'Outfit', system-ui, sans-serif; font-size: var(--text-base); line-height: 1.5; }
.page { max-width: 1200px; margin: 0 auto; padding: 32px 40px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.header-left h1 { font-size: var(--text-xl); font-weight: 700; color: var(--heading); margin-bottom: 2px; }
.header-left p { font-size: var(--text-sm); color: var(--muted); }
.theme-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); cursor: pointer; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.section-label { font-size: var(--text-xs); font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }

.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
th { background: var(--elevated); font-size: var(--text-xs); font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; padding: 10px 10px; text-align: center; border-bottom: 1px solid var(--border); white-space: nowrap; }
th:first-child { text-align: left; width: 180px; padding-left: 14px; }
td { border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }

th.week-col { position: relative; }
.week-inner { display: flex; flex-direction: column; align-items: center; gap: 0; }
.week-label { line-height: 1.3; }
.week-sub { font-weight: 400; text-transform: none; letter-spacing: 0; }

.expand-arrow {
  display: none; position: absolute;
  bottom: -1px; left: 50%; transform: translateX(-50%);
  width: 24px; height: 16px; background: var(--accent);
  border-radius: 0 0 6px 6px; cursor: pointer;
  align-items: center; justify-content: center; z-index: 2;
}
.expand-arrow .material-symbols-outlined { font-size: 14px; color: #fff; line-height: 1; }
.expand-arrow:hover { background: var(--accent-border); }
th.week-col:hover .expand-arrow { display: flex; }
th.week-col.selected { background: var(--accent-tint); color: var(--accent); }
th.week-col.selected .expand-arrow { display: flex; background: var(--accent); }

.member-cell { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
.avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: var(--text-xs); font-weight: 600; flex-shrink: 0; }
.avatar-human { background: var(--accent-tint); border: 1px solid var(--accent-border); color: var(--accent); }
.avatar-ai { background: var(--amber-tint); border: 1px solid var(--amber-border); color: var(--amber); }
.m-name { font-size: var(--text-sm); font-weight: 600; color: var(--heading); line-height: 1.2; }
.m-meta { font-size: var(--text-xs); color: var(--disabled); display: flex; align-items: center; gap: 6px; }

.margin-edit {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: var(--text-xs); color: var(--muted);
}
.margin-input {
  width: 34px; background: var(--elevated); border: 1px solid var(--border);
  border-radius: 4px; color: var(--subheading); font-family: inherit;
  font-size: var(--text-xs); font-weight: 600; text-align: center;
  padding: 1px 2px; outline: none; transition: border-color 0.15s;
  -moz-appearance: textfield; appearance: textfield;
}
.margin-input::-webkit-inner-spin-button,
.margin-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.margin-input:focus { border-color: var(--accent); }
.margin-input:hover { border-color: var(--border-subtle); }

.val-cell { padding: 8px 10px; text-align: center; min-width: 76px; }
.val-cost { font-size: var(--text-sm); font-weight: 600; color: var(--heading); white-space: nowrap; }
.val-cost .f { font-weight: 400; color: var(--muted); }
.val-nsr { font-size: var(--text-xs); color: var(--accent); white-space: nowrap; }
.val-nsr .f { color: var(--disabled); }
.val-bar { height: 3px; border-radius: 2px; background: var(--elevated); margin-top: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
.bg { background: var(--green); } .ba { background: var(--amber); } .bb { background: var(--accent); } .bm { background: var(--disabled); }

.future .val-cost { color: var(--disabled); }
.future .val-cost .f { display: none; }
.future .val-nsr { color: var(--disabled); opacity: 0.5; }

.total-cell { padding: 10px 10px; text-align: center; }
.t-cost { font-size: var(--text-sm); font-weight: 700; color: var(--heading); }
.t-nsr { font-size: var(--text-xs); color: var(--accent); }
.t-sub { font-size: var(--text-xs); color: var(--muted); }
.var-badge { display: inline-flex; flex-direction: column; align-items: center; gap: 1px; }
.vh { font-size: var(--text-sm); font-weight: 600; padding: 2px 10px; border-radius: 100px; }
.vn { font-size: var(--text-xs); font-weight: 500; }
.vp .vh { color: var(--green); background: var(--green-tint); } .vp .vn { color: var(--green); }
.vneg .vh { color: var(--rose); background: var(--rose-tint); } .vneg .vn { color: var(--rose); }
.vz .vh { color: var(--muted); background: var(--elevated); } .vz .vn { color: var(--muted); }
.totals-row td { background: var(--elevated); }

.separator-row td { background: var(--bg); padding: 4px 14px; border-bottom: none; }
.separator-label { font-size: var(--text-xs); font-weight: 600; color: var(--disabled); text-transform: uppercase; letter-spacing: 0.04em; }

.detail-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 24px; animation: slideDown 0.2s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.detail-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--elevated); }
.detail-title { font-size: var(--text-sm); font-weight: 600; color: var(--heading); display: flex; align-items: center; gap: 6px; }
.collapse-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer;
  font-family: inherit; font-size: var(--text-xs); font-weight: 500;
  padding: 5px 12px; border-radius: 6px; transition: all 0.15s;
}
.collapse-btn:hover { color: var(--heading); border-color: var(--border-subtle); background: var(--elevated); }
.collapse-btn .material-symbols-outlined { font-size: 14px; }

.detail-table { width: 100%; border-collapse: collapse; }
.detail-table th { background: var(--surface); font-size: var(--text-xs); font-weight: 500; color: var(--disabled); text-transform: none; letter-spacing: 0; padding: 8px 14px; border-bottom: 1px solid var(--border); }
.detail-table th:first-child { text-align: left; }
.detail-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); text-align: center; }
.detail-table td:first-child { text-align: left; }
.detail-table tr:last-child td { border-bottom: none; }
.detail-table .dv-cost { font-size: var(--text-sm); font-weight: 600; color: var(--heading); }
.detail-table .dv-cost .df { font-weight: 400; color: var(--muted); }
.detail-table .dv-nsr { font-size: var(--text-xs); color: var(--accent); }
.detail-table .dv-nsr .df { color: var(--disabled); }
.detail-table .future-cell .dv-cost { color: var(--disabled); }
.detail-table .future-cell .dv-cost .df { display: none; }
.detail-table .future-cell .dv-nsr { color: var(--disabled); opacity: 0.5; }
.detail-table .totals-row td { background: var(--elevated); font-weight: 700; }
.detail-member { display: flex; align-items: center; gap: 8px; }
.detail-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
.detail-name { font-size: var(--text-sm); font-weight: 600; color: var(--subheading); }

.error-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.error-state h2 { color: var(--heading); font-size: var(--text-lg); margin-bottom: 8px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-left">
      <h1>Resourcing</h1>
      <p id="subtitle"></p>
    </div>
    <div class="header-right">
      <button class="theme-btn" onclick="toggleTheme()">
        <span class="material-symbols-outlined" style="font-size:18px" id="themeIcon">light_mode</span>
      </button>
    </div>
  </div>
  <div class="section-label">Weekly Breakdown</div>
  <div id="mainTable"></div>
  <div id="detailPanel"></div>
</div>
<script>
let selectedWeek = null;
let projectId = null;
let data = [];   // processed member data
let weeks = [];  // week definitions
let currentWeek = -1; // index of the current week (weeks with actuals up to this point)

// ── Helpers ──

function fmtPrimary(m, v) {
  if (v === null || v === undefined) return '\u2014';
  return m.type === 'human' ? v.toFixed(1) + 'h' : '$' + v.toFixed(0);
}

function nsr(m, v) {
  if (v === null || v === undefined) return null;
  if (m.type === 'human') return v * m.rate;
  return v * (1 + m.margin / 100);
}

function fmtNsr(v) { return v === null || v === undefined ? '\u2014' : '$' + Math.round(v).toLocaleString(); }
function barCls(a, f) { return a === null ? 'bm' : a > f ? 'ba' : Math.abs(a - f) < 0.01 ? 'bg' : 'bb'; }
function varCls(v) { return v > 0.01 ? 'vp' : v < -0.01 ? 'vneg' : 'vz'; }
function sgn(v) { return v > 0 ? '+' : ''; }

// Get the Monday of the week containing a date
function weekMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  return localDateStr(dt);
}

function localDateStr(dt) {
  var y = dt.getFullYear();
  var m = String(dt.getMonth() + 1).padStart(2, '0');
  var d = String(dt.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + d;
}

// ── Data loading ──

async function init() {
  try {
    const manifestResp = await fetch('../../.team-agent/manifest.json');
    if (!manifestResp.ok) throw new Error('Could not load manifest');
    const manifest = await manifestResp.json();
    projectId = manifest.project_id;

    const [resourcingResp, forecastResp] = await Promise.all([
      fetch('/projects/' + projectId + '/resourcing'),
      fetch('forecast.json'),
    ]);

    if (!resourcingResp.ok) throw new Error('Could not load resourcing data');
    const resourcing = await resourcingResp.json();

    let forecast = { start_date: '', weeks: 13, members: {} };
    if (forecastResp.ok) {
      try { forecast = await forecastResp.json(); } catch (e) { /* use defaults */ }
    }

    processData(manifest, resourcing, forecast);
    renderMain();
  } catch (err) {
    document.getElementById('mainTable').innerHTML =
      '<div class="error-state"><h2>Unable to load</h2><p>' + err.message + '</p></div>';
  }
}

function processData(manifest, resourcing, forecast) {
  const numWeeks = forecast.weeks || 13;

  // Determine start date: use forecast start_date, or fall back to earliest actual data
  let startDate;
  if (forecast.start_date) {
    startDate = new Date(forecast.start_date + 'T00:00:00');
  } else {
    // Find earliest date across all member actuals
    let earliest = null;
    for (const m of resourcing.members) {
      const dates = (m.timesheets || m.costs || []).map(r => r.date);
      for (const d of dates) {
        if (!earliest || d < earliest) earliest = d;
      }
    }
    startDate = earliest ? new Date(earliest + 'T00:00:00') : new Date();
    // Snap to Monday
    const day = startDate.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    startDate.setDate(startDate.getDate() + diff);
  }

  // Build weeks array
  weeks = [];
  for (let w = 0; w < numWeeks; w++) {
    const s = new Date(startDate);
    s.setDate(s.getDate() + w * 7);
    const label = s.getDate() + ' ' + s.toLocaleString('en-AU', { month: 'short' });
    const days = [];
    for (let d = 0; d < 5; d++) {
      const dt = new Date(s);
      dt.setDate(dt.getDate() + d);
      days.push({
        label: dt.toLocaleString('en-AU', { weekday: 'short' }) + ' ' + dt.getDate(),
        date: localDateStr(dt),
      });
    }
    weeks.push({ label: label, days: days, startDate: localDateStr(s), index: w });
  }

  // Determine current week (last week that has any actuals, based on today)
  const today = localDateStr(new Date());
  currentWeek = -1;
  for (let i = 0; i < weeks.length; i++) {
    if (weeks[i].startDate <= today) currentWeek = i;
  }

  // Subtitle
  const endDate = new Date(startDate);
  endDate.setDate(endDate.getDate() + (numWeeks - 1) * 7 + 4);
  const fmt = function(d) { return d.toLocaleString('en-AU', { month: 'short', year: 'numeric' }); };
  document.getElementById('subtitle').textContent =
    (manifest.project_name || 'Project') + ' \u2014 ' + fmt(startDate) + ' to ' + fmt(endDate);

  // Process each member
  data = resourcing.members.map(function(m) {
    const isHuman = m.type === 'human';
    const isAi = m.type === 'ai' || m.type === 'coordinator';
    const s = m.settings || {};

    const entry = {
      id: m.id,
      name: m.name,
      initial: m.name.charAt(0).toUpperCase(),
      type: isHuman ? 'human' : 'ai',
      rate: s.rate || 0,
      margin: s.margin_percent || (isAi ? 200 : 30),
      wf: [], wa: [], df: [], da: [],
    };

    // Build lookup of daily actuals
    var dailyActuals = {};
    if (isHuman && m.timesheets) {
      m.timesheets.forEach(function(r) { dailyActuals[r.date] = r.hours; });
    } else if (isAi && m.costs) {
      m.costs.forEach(function(r) { dailyActuals[r.date] = r.cost; });
    }

    // Forecast data for this member
    var fc = (forecast.members || {})[m.name] || null;
    var fcDaily = fc ? (fc.daily || {}) : {};

    // Build weekly/daily arrays
    for (let wi = 0; wi < weeks.length; wi++) {
      var wk = weeks[wi];

      // Daily forecast: look up exact date values
      var dailyForecast = [];
      var weekForecast = 0;
      var hasAnyForecast = false;
      for (let d = 0; d < 5; d++) {
        var fVal = fcDaily[wk.days[d].date];
        if (fVal !== undefined) {
          dailyForecast.push(fVal);
          weekForecast += fVal;
          hasAnyForecast = true;
        } else {
          dailyForecast.push(null);
        }
      }
      entry.wf.push(hasAnyForecast ? weekForecast : null);
      entry.df.push(dailyForecast);

      // Daily actuals
      var isFuture = wi > currentWeek;
      if (isFuture) {
        entry.wa.push(null);
        entry.da.push(null);
      } else {
        var weekActualTotal = 0;
        var hasAny = false;
        var dayActuals = [];
        for (let d = 0; d < 5; d++) {
          var dateStr = wk.days[d].date;
          var val = dailyActuals[dateStr];
          if (val !== undefined) {
            dayActuals.push(val);
            weekActualTotal += val;
            hasAny = true;
          } else {
            dayActuals.push(0);
          }
        }
        entry.wa.push(hasAny ? weekActualTotal : 0);
        entry.da.push(dayActuals);
      }
    }

    return entry;
  });

  // Add forecast-only members (people in forecast.json but not yet in the project)
  var knownNames = new Set(data.map(function(d) { return d.name; }));
  var fcMembers = forecast.members || {};
  Object.keys(fcMembers).forEach(function(name) {
    if (knownNames.has(name)) return;
    var fc = fcMembers[name];
    var fcDaily = fc.daily || {};
    // Detect type: human values are ≤7.5, agent values are 100
    var sampleVal = 0;
    for (var k in fcDaily) { if (fcDaily[k] > 0) { sampleVal = fcDaily[k]; break; } }
    var isAi = sampleVal > 50;

    var entry = {
      id: 'forecast-' + name,
      name: name,
      initial: name.charAt(0).toUpperCase(),
      type: isAi ? 'ai' : 'human',
      rate: 0,
      margin: isAi ? 200 : 30,
      wf: [], wa: [], df: [], da: [],
      forecastOnly: true,
    };

    for (let wi = 0; wi < weeks.length; wi++) {
      var wk = weeks[wi];
      var dailyForecast = [];
      var weekForecast = 0;
      var hasAnyForecast = false;
      for (let d = 0; d < 5; d++) {
        var fVal = fcDaily[wk.days[d].date];
        if (fVal !== undefined) {
          dailyForecast.push(fVal);
          weekForecast += fVal;
          hasAnyForecast = true;
        } else {
          dailyForecast.push(null);
        }
      }
      entry.wf.push(hasAnyForecast ? weekForecast : null);
      entry.df.push(dailyForecast);
      entry.wa.push(0);
      entry.da.push([0, 0, 0, 0, 0]);
    }

    data.push(entry);
  });
}

// ── Rendering (same as approved mockup) ──

function renderMain() {
  var h = '<div class="table-wrap"><table><thead><tr><th>Member</th>';
  weeks.forEach(function(w, i) {
    var sel = selectedWeek === i ? ' selected' : '';
    h += '<th class="week-col' + sel + '"><div class="week-inner"><span class="week-label">W' + (i + 1) + '</span><span class="week-sub">' + w.label + '</span></div><div class="expand-arrow" onclick="expandWeek(' + i + ')" title="Show daily breakdown"><span class="material-symbols-outlined">expand_more</span></div></th>';
  });
  h += '<th>Total</th><th>Var</th></tr></thead><tbody>';

  var humans = data.filter(function(m) { return m.type === 'human'; });
  var agents = data.filter(function(m) { return m.type === 'ai'; });

  function renderMemberRows(list) {
    list.forEach(function(m) {
      h += '<tr>';
      var avCls = m.type === 'human' ? 'avatar-human' : 'avatar-ai';
      h += '<td><div class="member-cell"><div class="avatar ' + avCls + '">' + m.initial + '</div><div>';
      h += '<div class="m-name">' + m.name + '</div>';
      h += '<div class="m-meta">';
      if (m.type === 'human') {
        h += '<span>$' + m.rate + '/hr</span>';
      } else {
        h += '<span class="margin-edit">margin <input class="margin-input" type="number" value="' + m.margin + '" min="0" max="999" onchange="updateMargin(\'' + m.id + '\',\'' + m.name + '\',this.value)" title="Margin %">%</span>';
      }
      h += '</div></div></div></td>';

      weeks.forEach(function(_, i) {
        var f = m.wf[i], a = m.wa[i], fut = i > currentWeek;
        var fNsr = nsr(m, f), aNsr = nsr(m, a);
        var pct = fNsr > 0 && aNsr !== null ? Math.min((aNsr / fNsr) * 100, 100) : 0;
        h += '<td class="' + (fut ? 'future' : '') + '"><div class="val-cell">';
        if (a !== null && !fut) {
          h += '<div class="val-cost">' + fmtPrimary(m, a) + (f !== null ? ' <span class="f">(' + fmtPrimary(m, f) + ')</span>' : '') + '</div>';
          h += '<div class="val-nsr">' + fmtNsr(aNsr) + (fNsr !== null ? ' <span class="f">(' + fmtNsr(fNsr) + ')</span>' : '') + '</div>';
          if (f !== null) h += '<div class="val-bar"><div class="bar-fill ' + barCls(aNsr, fNsr) + '" style="width:' + pct + '%"></div></div>';
        } else if (f !== null) {
          h += '<div class="val-cost">' + fmtPrimary(m, f) + '</div>';
          h += '<div class="val-nsr">' + fmtNsr(fNsr) + '</div>';
        } else {
          h += '<div class="val-cost">\u2014</div>';
        }
        h += '</div></td>';
      });

      // Totals
      var totANsr = 0, totFNsr = 0;
      weeks.forEach(function(_, i) {
        totFNsr += nsr(m, m.wf[i]) || 0;
        if (m.wa[i] !== null && i <= currentWeek) totANsr += nsr(m, m.wa[i]) || 0;
      });
      var vR = totANsr - totFNsr, vc = varCls(vR);
      h += '<td><div class="total-cell"><div class="t-nsr" style="font-size:var(--text-sm);font-weight:700;color:var(--heading)">' + fmtNsr(totANsr) + '</div><div class="t-sub">of ' + fmtNsr(totFNsr) + '</div></div></td>';
      h += '<td><div class="total-cell"><div class="var-badge ' + vc + '"><span class="vh">' + sgn(vR) + fmtNsr(vR) + '</span></div></div></td>';
      h += '</tr>';
    });
  }

  // Human section
  if (humans.length > 0) {
    h += '<tr class="separator-row"><td colspan="' + (weeks.length + 3) + '"><div class="separator-label"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;margin-right:4px">person</span>People</div></td></tr>';
    renderMemberRows(humans);
  }

  // Agent section
  if (agents.length > 0) {
    h += '<tr class="separator-row"><td colspan="' + (weeks.length + 3) + '"><div class="separator-label"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;margin-right:4px">smart_toy</span>Agents</div></td></tr>';
    renderMemberRows(agents);
  }

  if (data.length === 0) {
    h += '<tr><td colspan="' + (weeks.length + 3) + '"><div class="empty-state">No members found</div></td></tr>';
  }

  // Grand totals
  if (data.length > 0) {
    h += '<tr class="totals-row"><td><div class="member-cell" style="font-weight:700;color:var(--heading)">Total</div></td>';
    var gAR = 0, gFR = 0;
    weeks.forEach(function(_, i) {
      var wAR = 0, wFR = 0, has = false;
      data.forEach(function(m) {
        wFR += nsr(m, m.wf[i]) || 0;
        if (m.wa[i] !== null && i <= currentWeek) { wAR += nsr(m, m.wa[i]) || 0; has = true; }
      });
      gFR += wFR; gAR += wAR;
      h += '<td class="' + (i > currentWeek ? 'future' : '') + '"><div class="val-cell">';
      if (has) { h += '<div class="val-cost" style="font-weight:700">' + fmtNsr(wAR) + (wFR > 0 ? ' <span class="f">(' + fmtNsr(wFR) + ')</span>' : '') + '</div>'; }
      else if (wFR > 0) { h += '<div class="val-cost">' + fmtNsr(wFR) + '</div>'; }
      else { h += '<div class="val-cost">\u2014</div>'; }
      h += '</div></td>';
    });
    var gV = gAR - gFR, gc = varCls(gV);
    h += '<td><div class="total-cell"><div class="t-nsr" style="font-size:var(--text-sm);font-weight:700;color:var(--heading)">' + fmtNsr(gAR) + '</div><div class="t-sub">of ' + fmtNsr(gFR) + '</div></div></td>';
    h += '<td><div class="total-cell"><div class="var-badge ' + gc + '"><span class="vh">' + sgn(gV) + fmtNsr(gV) + '</span></div></div></td>';
    h += '</tr>';
  }

  h += '</tbody></table></div>';
  document.getElementById('mainTable').innerHTML = h;
}

function renderDetail() {
  var el = document.getElementById('detailPanel');
  if (selectedWeek === null) { el.innerHTML = ''; return; }
  var wi = selectedWeek, w = weeks[wi], fut = wi > currentWeek;
  var h = '<div class="detail-panel" id="detailCard">';
  h += '<div class="detail-header"><div class="detail-title"><span class="material-symbols-outlined" style="font-size:18px">calendar_today</span> W' + (wi + 1) + ' \u00B7 ' + w.label + ' \u2014 Daily Breakdown</div>';
  h += '<button class="collapse-btn" onclick="collapseDetail()"><span class="material-symbols-outlined">expand_less</span> Collapse</button></div>';
  h += '<table class="detail-table"><thead><tr><th>Member</th>';
  w.days.forEach(function(d) { h += '<th>' + d.label + '</th>'; });
  h += '<th>Week Total</th></tr></thead><tbody>';

  data.forEach(function(m) {
    var avCls = m.type === 'human' ? 'avatar-human' : 'avatar-ai';
    h += '<tr>';
    h += '<td><div class="detail-member"><div class="detail-avatar ' + avCls + '">' + m.initial + '</div><div class="detail-name">' + m.name + '</div></div></td>';
    for (var d = 0; d < 5; d++) {
      var fv = m.df[wi] ? m.df[wi][d] : null;
      var av = m.da[wi] ? m.da[wi][d] : null;
      var fNsr = nsr(m, fv), aNsr = nsr(m, av);
      var fc = fut || av === null ? ' future-cell' : '';
      h += '<td class="' + fc + '">';
      if (av !== null && !fut) {
        h += '<div class="dv-cost">' + fmtPrimary(m, av) + (fv !== null ? ' <span class="df">(' + fmtPrimary(m, fv) + ')</span>' : '') + '</div>';
        h += '<div class="dv-nsr">' + fmtNsr(aNsr) + (fNsr !== null ? ' <span class="df">(' + fmtNsr(fNsr) + ')</span>' : '') + '</div>';
      } else if (fv !== null) {
        h += '<div class="dv-cost">' + fmtPrimary(m, fv) + '</div><div class="dv-nsr">' + fmtNsr(fNsr) + '</div>';
      } else {
        h += '<div class="dv-cost">\u2014</div>';
      }
      h += '</td>';
    }
    var wfv = m.wf[wi], wav = m.wa[wi];
    var wfNsr = nsr(m, wfv), waNsr = nsr(m, wav);
    h += '<td>';
    if (wav !== null && !fut) {
      h += '<div class="dv-cost" style="font-weight:700">' + fmtPrimary(m, wav) + (wfv !== null ? ' <span class="df">(' + fmtPrimary(m, wfv) + ')</span>' : '') + '</div>';
      h += '<div class="dv-nsr">' + fmtNsr(waNsr) + (wfNsr !== null ? ' <span class="df">(' + fmtNsr(wfNsr) + ')</span>' : '') + '</div>';
    } else if (wfv !== null) {
      h += '<div class="dv-cost" style="font-weight:700">' + fmtPrimary(m, wfv) + '</div><div class="dv-nsr">' + fmtNsr(wfNsr) + '</div>';
    } else {
      h += '<div class="dv-cost">\u2014</div>';
    }
    h += '</td></tr>';
  });

  // Detail totals
  h += '<tr class="totals-row"><td><div class="detail-member" style="font-weight:700;color:var(--heading)">Total</div></td>';
  for (var d = 0; d < 5; d++) {
    var dAR = 0, dFR = 0, has = false;
    data.forEach(function(m) {
      if (m.df[wi]) dFR += nsr(m, m.df[wi][d]) || 0;
      if (m.da[wi]) { dAR += nsr(m, m.da[wi][d]) || 0; has = true; }
    });
    h += '<td>';
    if (has && !fut) h += '<div class="dv-cost" style="font-weight:700">' + fmtNsr(dAR) + (dFR > 0 ? ' <span class="df">(' + fmtNsr(dFR) + ')</span>' : '') + '</div>';
    else if (dFR > 0) h += '<div class="dv-cost" style="color:var(--disabled)">' + fmtNsr(dFR) + '</div>';
    else h += '<div class="dv-cost">\u2014</div>';
    h += '</td>';
  }
  var wAR = 0, wFR = 0;
  data.forEach(function(m) { wFR += nsr(m, m.wf[wi]) || 0; if (m.wa[wi] !== null && !fut) wAR += nsr(m, m.wa[wi]) || 0; });
  h += '<td>';
  if (!fut) h += '<div class="dv-cost" style="font-weight:700">' + fmtNsr(wAR) + (wFR > 0 ? ' <span class="df">(' + fmtNsr(wFR) + ')</span>' : '') + '</div>';
  else if (wFR > 0) h += '<div class="dv-cost" style="font-weight:700">' + fmtNsr(wFR) + '</div>';
  h += '</td>';
  h += '</tr></tbody></table></div>';
  el.innerHTML = h;
}

// ── Interactions ──

var marginTimer = null;
function updateMargin(id, name, val) {
  var m = data.find(function(m) { return m.name === name; });
  if (!m) return;
  m.margin = Math.max(0, parseInt(val) || 0);
  renderMain();
  renderDetail();

  // Debounced save to API
  if (marginTimer) clearTimeout(marginTimer);
  marginTimer = setTimeout(function() {
    fetch('/projects/' + projectId + '/members/' + id + '/settings', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ settings: { margin_percent: m.margin } }),
    });
  }, 600);
}

function expandWeek(wi) {
  selectedWeek = selectedWeek === wi ? null : wi;
  renderMain();
  renderDetail();
  if (selectedWeek !== null) {
    requestAnimationFrame(function() {
      var c = document.getElementById('detailCard');
      if (c) c.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }
}

function collapseDetail() {
  selectedWeek = null;
  renderMain();
  renderDetail();
  requestAnimationFrame(function() {
    document.getElementById('mainTable').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

function toggleTheme() {
  document.documentElement.classList.toggle('light');
  document.getElementById('themeIcon').textContent =
    document.documentElement.classList.contains('light') ? 'dark_mode' : 'light_mode';
}

// Theme sync from parent iframe
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'theme') {
    document.documentElement.classList.toggle('light', e.data.theme === 'light');
    document.getElementById('themeIcon').textContent = e.data.theme === 'light' ? 'dark_mode' : 'light_mode';
  }
});

init();
</script>
</body>
</html>
