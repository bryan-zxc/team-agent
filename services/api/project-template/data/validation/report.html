<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Validation Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
/* ── Design Tokens: Dark (default) ── */
:root {
  --bg: #171719;
  --surface: #1f1f24;
  --elevated: #26262c;
  --border: #2a2a2f;
  --border-subtle: #35353c;
  --heading: #f0eff5;
  --subheading: #c8c8d0;
  --body: #8a8a95;
  --muted: #6b6b78;
  --disabled: #44444f;
  --accent: #7c8ae5;
  --accent-tint: rgba(124,138,229,0.1);
  --accent-border: rgba(124,138,229,0.18);
  --green: #5b9a7a;
  --green-tint: rgba(91,154,122,0.1);
  --green-border: rgba(91,154,122,0.15);
  --amber: #e0a05f;
  --amber-tint: rgba(224,160,95,0.12);
  --amber-border: rgba(224,160,95,0.15);
  --rose: #d46b6b;
  --rose-tint: rgba(212,107,107,0.12);
  --rose-border: rgba(212,107,107,0.15);
  --font: 'Outfit', system-ui, sans-serif;
  --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  --text-xs: 11px;
  --text-sm: 13px;
  --text-base: 14px;
  --text-lg: 18px;
  --text-xl: 24px;
  --text-2xl: 32px;
}

/* ── Design Tokens: Light ── */
html.light {
  --bg: #faf9f7;
  --surface: #ffffff;
  --elevated: #f5f4f2;
  --border: #e8e6e3;
  --border-subtle: #d5d3d0;
  --heading: #1a1a1f;
  --subheading: #4a4a55;
  --body: #6b6b78;
  --muted: #9a9aa5;
  --disabled: #c0c0c8;
  --accent: #5560c0;
  --accent-tint: rgba(85,96,192,0.08);
  --accent-border: rgba(85,96,192,0.15);
  --green: #3d8a5e;
  --green-tint: rgba(61,138,94,0.08);
  --green-border: rgba(61,138,94,0.12);
  --amber: #c49040;
  --amber-tint: rgba(196,144,64,0.1);
  --amber-border: rgba(196,144,64,0.12);
  --rose: #c44e4e;
  --rose-tint: rgba(196,78,78,0.08);
  --rose-border: rgba(196,78,78,0.12);
}

/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--body);
  font-family: var(--font);
  font-size: var(--text-base);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  overflow: hidden;
}

/* ── App Shell ── */
.app-shell { display: flex; flex-direction: column; height: 100vh; }

/* ── Top Bar ── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.top-bar h1 {
  font-size: var(--text-lg);
  font-weight: 700;
  color: var(--heading);
}
.top-bar-sub {
  font-size: var(--text-sm);
  color: var(--muted);
  margin-left: 12px;
  font-weight: 400;
}
.top-bar-actions { display: flex; gap: 8px; align-items: center; }
.theme-toggle {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--elevated); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: background 0.15s, color 0.15s;
}
.theme-toggle:hover { color: var(--heading); }

/* ── Stats Row ── */
.stats-row {
  display: flex;
  gap: 24px;
  padding: 10px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: var(--text-sm);
  color: var(--muted);
}
.stat-item .num {
  font-weight: 700;
  font-size: var(--text-base);
  color: var(--heading);
}
.stat-dot { width: 6px; height: 6px; border-radius: 50%; }
.stat-dot.total { background: var(--accent); }
.stat-dot.open { background: var(--amber); }
.stat-dot.decided { background: var(--green); }

/* ── Split Layout ── */
.split { display: flex; flex: 1; overflow: hidden; }

/* ── Left Panel: Issue List ── */
.issue-list {
  width: 320px;
  min-width: 320px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--surface);
}
.issue-item {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.issue-item:hover { background: var(--elevated); }
.issue-item.active {
  background: var(--accent-tint);
  border-right: 3px solid var(--accent);
}
.issue-item-indicator {
  width: 8px; height: 8px; border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
}
.issue-item-indicator.open { background: var(--amber); }
.issue-item-indicator.decided { background: var(--green); }
.issue-item-content { flex: 1; min-width: 0; }
.issue-item-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.issue-item-id {
  font-family: var(--mono);
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--accent);
}
.pill {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 8px;
  border-radius: 100px;
}
.pill-amber { color: var(--amber); background: var(--amber-tint); }
.pill-rose { color: var(--rose); background: var(--rose-tint); }
.pill-green { color: var(--green); background: var(--green-tint); }
.pill-accent { color: var(--accent); background: var(--accent-tint); }
.issue-item-question {
  font-size: var(--text-sm);
  color: var(--subheading);
  font-weight: 500;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── Right Panel: Detail ── */
.detail-panel { flex: 1; overflow-y: auto; background: var(--bg); }
.detail-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--muted);
  font-size: var(--text-sm);
}
.detail-content {
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Detail sections */
.detail-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.detail-id {
  font-family: var(--mono);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 4px;
}
.detail-badges { display: flex; gap: 6px; }
.detail-question {
  font-size: var(--text-base);
  color: var(--heading);
  font-weight: 500;
  line-height: 1.6;
}
.section-label {
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.proposed-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  font-size: var(--text-sm);
  color: var(--body);
  line-height: 1.6;
}

/* ── Sample Data (collapsible) ── */
.sample-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.sample-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--elevated);
  border-bottom: 1px solid var(--border);
}
.sample-card-header .section-label { margin-bottom: 0; }
.sample-card-body { display: none; }
.sample-card-body.visible { display: block; }
.sample-toggle-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-family: var(--font);
  font-size: var(--text-sm);
  font-weight: 500;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 4px;
}
.sample-toggle-btn:hover { text-decoration: underline; }
.sample-toggle-btn .material-symbols-outlined {
  font-size: 16px;
  transition: transform 0.2s;
}
.sample-toggle-btn.expanded .material-symbols-outlined {
  transform: rotate(180deg);
}
.sample-table-name {
  font-size: var(--text-xs);
  color: var(--disabled);
  font-family: var(--mono);
}
.sample-scroll { overflow-x: auto; max-height: 320px; overflow-y: auto; }
.sample-table {
  width: 100%;
  border-collapse: collapse;
}
.sample-table th {
  text-align: left;
  padding: 7px 14px;
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--muted);
  background: var(--elevated);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  position: sticky;
  top: 0;
  cursor: pointer;
  user-select: none;
  z-index: 1;
}
.sample-table th:hover { color: var(--subheading); }
.sample-table th .sort-indicator {
  font-size: 10px;
  margin-left: 4px;
  color: var(--accent);
}
.sample-table td {
  padding: 6px 14px;
  font-family: var(--mono);
  font-size: var(--text-xs);
  color: var(--body);
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
.sample-table tr:last-child td { border-bottom: none; }
.sample-status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 14px;
  font-size: var(--text-xs);
  color: var(--muted);
  border-top: 1px solid var(--border);
  background: var(--elevated);
}
.sample-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  font-size: var(--text-sm);
  color: var(--muted);
}

/* ── Decision Inputs ── */
.decision-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.decision-field label {
  display: block;
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  margin-bottom: 6px;
}
.decision-field textarea {
  width: 100%;
  min-height: 70px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--heading);
  font-family: var(--font);
  font-size: var(--text-sm);
  line-height: 1.5;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
}
.decision-field textarea:focus { border-color: var(--accent); }
.decision-field textarea::placeholder { color: var(--disabled); }
.decision-field textarea.filled {
  background: var(--green-tint);
  border-color: var(--green-border);
}

/* ── Bottom Bar ── */
.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.btn {
  font-family: var(--font);
  font-size: var(--text-sm);
  font-weight: 600;
  padding: 8px 20px;
  border-radius: 8px;
  cursor: pointer;
  border: none;
  transition: background 0.15s, opacity 0.15s;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  background: var(--elevated);
  color: var(--heading);
  border: 1px solid var(--border);
}
.btn-secondary:hover:not(:disabled) { background: var(--border); }
.btn-success { background: var(--green); color: #fff; }
.btn-success:hover:not(:disabled) { background: #4d8a6c; }
.footer-hint { font-size: var(--text-sm); color: var(--muted); }

/* ── Toast ── */
.toast {
  display: none;
  position: fixed;
  bottom: 72px;
  right: 24px;
  background: var(--surface);
  border: 1px solid var(--green-border);
  border-radius: 10px;
  padding: 12px 18px;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  z-index: 100;
}
.toast.visible { display: flex; }
.toast.error { border-color: var(--rose-border); }
.toast .material-symbols-outlined { color: var(--green); font-size: 20px; }
.toast.error .material-symbols-outlined { color: var(--rose); }
.toast p { font-size: var(--text-sm); color: var(--heading); }

/* ── Empty State ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  color: var(--muted);
}
.empty-state .material-symbols-outlined {
  font-size: 48px;
  color: var(--disabled);
}
.empty-state p { font-size: var(--text-sm); }
</style>
</head>
<body>
<div class="app-shell">
  <div class="top-bar">
    <div style="display:flex;align-items:baseline;">
      <h1 id="report-title">Data Validation Report</h1>
      <span class="top-bar-sub" id="report-subtitle"></span>
    </div>
    <div class="top-bar-actions">
      <button class="theme-toggle" id="btn-theme" onclick="toggleTheme()" title="Toggle theme">&#9790;</button>
    </div>
  </div>

  <div class="stats-row" id="stats-row" style="display:none">
    <div class="stat-item"><span class="stat-dot total"></span> <span class="num" id="stat-total">0</span> Issues</div>
    <div class="stat-item"><span class="stat-dot open"></span> <span class="num" id="stat-open">0</span> Open</div>
    <div class="stat-item"><span class="stat-dot decided"></span> <span class="num" id="stat-decided">0</span> Decided</div>
  </div>

  <div class="split">
    <div class="issue-list" id="issue-list" style="display:none"></div>
    <div class="detail-panel" id="detail-panel">
      <div class="empty-state">
        <span class="material-symbols-outlined">assignment</span>
        <p>No validation issues yet.</p>
        <p>Issues will appear here once the validation skill runs.</p>
      </div>
    </div>
  </div>

  <div class="bottom-bar" id="bottom-bar" style="display:none">
    <span class="footer-hint" id="footer-hint"></span>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="handleSave()" id="btn-save">Save Draft</button>
      <button class="btn btn-success" onclick="handleFinalise()" id="btn-finalise">Finalise &amp; Submit</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span class="material-symbols-outlined">check_circle</span>
  <p id="toast-text"></p>
</div>

<script>
// ── State ──
var reportData = null;
var selectedId = null;
var isDark = true;
var drafts = {};
var sampleCache = {}; // keyed by issue id: { columns, rows, totalRows, sort, loading }

var PAGE_SIZE = 100;
var SCROLL_THRESHOLD = 200;

// Context injected by parent FileTab via postMessage
var ctx = { chatId: null, projectId: null, filePath: null };

// ── Theme ──
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.classList.toggle("light", !isDark);
  document.getElementById("btn-theme").innerHTML = isDark ? "&#9790;" : "&#9788;";
}

function applyTheme(theme) {
  isDark = theme === "dark";
  document.documentElement.classList.toggle("light", !isDark);
  document.getElementById("btn-theme").innerHTML = isDark ? "&#9790;" : "&#9788;";
}

// ── API helpers ──
function apiBase() {
  return "";
}

function jsonPath() {
  if (ctx.filePath) {
    return ctx.filePath.replace(/report\.html$/, "report_data.json");
  }
  return "data/validation/report_data.json";
}

async function fetchReportData() {
  if (!ctx.projectId) return;
  var chatParam = ctx.chatId ? "?chat_id=" + ctx.chatId : "";
  var url = apiBase() + "/projects/" + ctx.projectId + "/raw/" + jsonPath() + chatParam;
  try {
    var resp = await fetch(url, { credentials: "include" });
    if (!resp.ok) return;
    reportData = await resp.json();
    render();
  } catch (err) {
    console.error("Failed to fetch report data:", err);
  }
}

async function saveReportData() {
  if (!ctx.projectId || !reportData) return false;
  collectDrafts();
  var chatParam = ctx.chatId ? "&chat_id=" + ctx.chatId : "";
  var url = apiBase() + "/projects/" + ctx.projectId + "/files/content?path=" + encodeURIComponent(jsonPath()) + chatParam;
  try {
    var resp = await fetch(url, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ content: JSON.stringify(reportData, null, 2) }),
    });
    return resp.ok;
  } catch (err) {
    console.error("Failed to save:", err);
    return false;
  }
}

async function commitAndPush() {
  if (!ctx.projectId) return false;
  var chatParam = ctx.chatId ? "?chat_id=" + ctx.chatId : "";
  var url = apiBase() + "/projects/" + ctx.projectId + "/files/commit" + chatParam;
  try {
    var resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({
        paths: [jsonPath()],
        message: "Update validation report decisions",
      }),
    });
    return resp.ok;
  } catch (err) {
    console.error("Failed to commit:", err);
    return false;
  }
}

async function postChatMessage(text) {
  if (!ctx.chatId) return false;
  var url = apiBase() + "/chats/" + ctx.chatId + "/messages";
  try {
    var resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({
        blocks: [{ type: "text", value: text }],
        mentions: [],
      }),
    });
    return resp.ok;
  } catch (err) {
    console.error("Failed to post message:", err);
    return false;
  }
}

// ── Sample data from DuckDB ──
async function fetchSampleData(issueId, tableName, offset, sortCol, sortDir, append) {
  if (!ctx.projectId || !tableName) return;
  var cache = sampleCache[issueId];
  if (!cache) {
    cache = { columns: [], rows: [], totalRows: 0, sort: null, loading: false };
    sampleCache[issueId] = cache;
  }
  if (cache.loading) return;
  cache.loading = true;
  updateSampleUI(issueId);

  var sql = 'SELECT * FROM "' + tableName.replace(/"/g, '""') + '"';
  try {
    var resp = await fetch(apiBase() + "/projects/" + ctx.projectId + "/data/query", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({
        database: "data",
        sql: sql,
        offset: offset,
        limit: PAGE_SIZE,
        sort_column: sortCol || null,
        sort_direction: sortDir || "asc",
      }),
    });
    var data = await resp.json();
    if (data.results && data.results.length > 0) {
      var result = data.results[data.results.length - 1];
      cache.columns = result.columns;
      cache.totalRows = result.total_rows;
      if (append) {
        cache.rows = cache.rows.concat(result.rows);
      } else {
        cache.rows = result.rows;
      }
    }
  } catch (err) {
    console.error("Failed to fetch sample data:", err);
  }
  cache.loading = false;
  updateSampleUI(issueId);
}

function updateSampleUI(issueId) {
  // Only update if this issue is currently displayed
  if (issueId !== selectedId) return;
  var body = document.getElementById("sample-body");
  if (!body || !body.classList.contains("visible")) return;
  renderSampleGrid(issueId);
}

function renderSampleGrid(issueId) {
  var container = document.getElementById("sample-grid-container");
  if (!container) return;
  var cache = sampleCache[issueId];
  if (!cache) {
    container.innerHTML = '<div class="sample-loading">No data</div>';
    return;
  }
  if (cache.columns.length === 0 && cache.loading) {
    container.innerHTML = '<div class="sample-loading">Loading...</div>';
    return;
  }
  if (cache.columns.length === 0) {
    container.innerHTML = '<div class="sample-loading">No data available</div>';
    return;
  }

  var sort = cache.sort;
  var headerHtml = cache.columns.map(function(col) {
    var indicator = "";
    if (sort && sort.column === col) {
      indicator = '<span class="sort-indicator">' + (sort.direction === "asc" ? " \u25B2" : " \u25BC") + '</span>';
    }
    return '<th data-col="' + escapeHtml(col) + '">' + escapeHtml(col) + indicator + '</th>';
  }).join("");

  var rowsHtml = cache.rows.map(function(row) {
    return "<tr>" + row.map(function(v) {
      return "<td>" + escapeHtml(v === null ? "" : String(v)) + "</td>";
    }).join("") + "</tr>";
  }).join("");

  var statusText = cache.rows.length + " of " + cache.totalRows + " rows";
  var loadingText = cache.loading ? "Loading..." : "";

  container.innerHTML =
    '<div class="sample-scroll" id="sample-scroll">' +
      '<table class="sample-table">' +
        '<thead><tr>' + headerHtml + '</tr></thead>' +
        '<tbody>' + rowsHtml + '</tbody>' +
      '</table>' +
    '</div>' +
    '<div class="sample-status-bar">' +
      '<span>' + statusText + '</span>' +
      '<span>' + loadingText + '</span>' +
    '</div>';

  // Bind sort handlers on headers
  var ths = container.querySelectorAll("th[data-col]");
  ths.forEach(function(th) {
    th.addEventListener("click", function() {
      var col = this.getAttribute("data-col");
      handleSampleSort(issueId, col);
    });
  });

  // Bind scroll handler for loading more
  var scrollEl = document.getElementById("sample-scroll");
  if (scrollEl) {
    scrollEl.addEventListener("scroll", function() {
      handleSampleScroll(issueId, this);
    });
  }
}

function handleSampleSort(issueId, colName) {
  var cache = sampleCache[issueId];
  if (!cache || cache.loading) return;
  var sort = cache.sort;
  if (sort && sort.column === colName) {
    if (sort.direction === "asc") {
      cache.sort = { column: colName, direction: "desc" };
    } else {
      cache.sort = null;
    }
  } else {
    cache.sort = { column: colName, direction: "asc" };
  }

  var issue = reportData.issues.find(function(i) { return i.id === issueId; });
  if (!issue) return;
  var s = cache.sort;
  fetchSampleData(issueId, issue.sample_table, 0, s ? s.column : null, s ? s.direction : "asc", false);
}

function handleSampleScroll(issueId, el) {
  var cache = sampleCache[issueId];
  if (!cache || cache.loading) return;
  if (cache.rows.length >= cache.totalRows) return;
  if (el.scrollHeight - el.scrollTop - el.clientHeight < SCROLL_THRESHOLD) {
    var issue = reportData.issues.find(function(i) { return i.id === issueId; });
    if (!issue) return;
    var s = cache.sort;
    fetchSampleData(issueId, issue.sample_table, cache.rows.length, s ? s.column : null, s ? s.direction : "asc", true);
  }
}

// ── Draft management ──
function saveDraftsForCurrent() {
  if (!selectedId) return;
  var dec = document.querySelector("textarea[data-field='final_decision']");
  var com = document.querySelector("textarea[data-field='comments']");
  if (dec) drafts[selectedId + "_decision"] = dec.value;
  if (com) drafts[selectedId + "_comments"] = com.value;
}

function getDecision(issue) {
  var key = issue.id + "_decision";
  return key in drafts ? drafts[key] : issue.final_decision;
}

function getComments(issue) {
  var key = issue.id + "_comments";
  return key in drafts ? drafts[key] : issue.comments;
}

function collectDrafts() {
  saveDraftsForCurrent();
  if (!reportData) return;
  reportData.issues.forEach(function(issue) {
    var dk = issue.id + "_decision";
    var ck = issue.id + "_comments";
    if (dk in drafts) issue.final_decision = drafts[dk];
    if (ck in drafts) issue.comments = drafts[ck];
  });
}

// ── Rendering ──
function render() {
  var hasIssues = reportData && reportData.issues && reportData.issues.length > 0;

  document.getElementById("stats-row").style.display = hasIssues ? "" : "none";
  document.getElementById("issue-list").style.display = hasIssues ? "" : "none";
  document.getElementById("bottom-bar").style.display = hasIssues ? "" : "none";

  if (!hasIssues) {
    document.getElementById("detail-panel").innerHTML =
      '<div class="empty-state">' +
        '<span class="material-symbols-outlined">assignment</span>' +
        '<p>No validation issues yet.</p>' +
        '<p>Issues will appear here once the validation skill runs.</p>' +
      '</div>';
    document.getElementById("report-subtitle").textContent = "";
    return;
  }

  if (reportData.report_title) {
    document.getElementById("report-title").textContent = reportData.report_title;
  }
  var sub = "";
  if (reportData.project_name) sub += reportData.project_name;
  if (reportData.generated_at) {
    var d = new Date(reportData.generated_at);
    sub += (sub ? " \u00b7 " : "") + "Generated " + d.toLocaleDateString("en-AU", { day: "numeric", month: "short", year: "numeric" });
  }
  document.getElementById("report-subtitle").textContent = sub;

  if (!selectedId && reportData.issues.length > 0) {
    selectedId = reportData.issues[0].id;
  }

  renderList();
  renderDetail();
  updateStats();
}

function renderList() {
  var list = document.getElementById("issue-list");
  list.innerHTML = "";

  reportData.issues.forEach(function(issue) {
    var decision = getDecision(issue);
    var isDecided = decision && decision.trim().length > 0;
    var prioColour = issue.priority === "high" ? "rose" : issue.priority === "medium" ? "amber" : "accent";

    var item = document.createElement("div");
    item.className = "issue-item" + (selectedId === issue.id ? " active" : "");
    item.onclick = function() { selectIssue(issue.id); };

    item.innerHTML =
      '<div class="issue-item-indicator ' + (isDecided ? "decided" : "open") + '"></div>' +
      '<div class="issue-item-content">' +
        '<div class="issue-item-top">' +
          '<span class="issue-item-id">' + issue.id + '</span>' +
          '<span class="pill pill-' + prioColour + '">' + issue.priority + '</span>' +
        '</div>' +
        '<div class="issue-item-question">' + escapeHtml(issue.question) + '</div>' +
      '</div>';
    list.appendChild(item);
  });
}

function renderDetail() {
  var panel = document.getElementById("detail-panel");

  if (!selectedId || !reportData) {
    panel.innerHTML = '<div class="detail-empty">Select an issue to review</div>';
    return;
  }

  var issue = reportData.issues.find(function(i) { return i.id === selectedId; });
  if (!issue) {
    panel.innerHTML = '<div class="detail-empty">Issue not found</div>';
    return;
  }

  var prioColour = issue.priority === "high" ? "rose" : issue.priority === "medium" ? "amber" : "accent";
  var decision = getDecision(issue);
  var comments = getComments(issue);
  var isDecided = decision && decision.trim().length > 0;

  var cachedInfo = sampleCache[issue.id];
  var totalLabel = cachedInfo ? cachedInfo.totalRows + " rows" : "rows";

  panel.innerHTML =
    '<div class="detail-content">' +
      '<div>' +
        '<div class="detail-header">' +
          '<div>' +
            '<div class="detail-id">' + issue.id + '</div>' +
            '<div class="detail-badges">' +
              '<span class="pill pill-' + prioColour + '">' + issue.priority + '</span>' +
              '<span class="pill pill-' + (isDecided ? "green" : "amber") + '">' + (isDecided ? "decided" : "open") + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div>' +
        '<div class="section-label">Data Question / Request</div>' +
        '<div class="detail-question">' + escapeHtml(issue.question) + '</div>' +
      '</div>' +
      '<div>' +
        '<div class="section-label">Proposed Solution</div>' +
        '<div class="proposed-box">' + escapeHtml(issue.proposed_solution) + '</div>' +
      '</div>' +
      '<div class="sample-card">' +
        '<div class="sample-card-header">' +
          '<button class="sample-toggle-btn" id="sample-toggle-btn" onclick="toggleSample(\'' + issue.id + '\')">' +
            '<span class="material-symbols-outlined">expand_more</span>' +
            'Sample data (' + totalLabel + ')' +
          '</button>' +
          '<span class="sample-table-name">' + escapeHtml(issue.sample_table || "") + '</span>' +
        '</div>' +
        '<div class="sample-card-body" id="sample-body">' +
          '<div id="sample-grid-container"><div class="sample-loading">Click to load data</div></div>' +
        '</div>' +
      '</div>' +
      '<div class="decision-grid">' +
        '<div class="decision-field">' +
          '<label>Final Decision</label>' +
          '<textarea data-field="final_decision" placeholder="Enter your decision..."' +
            (decision ? ' class="filled"' : '') + '>' + escapeHtml(decision || "") + '</textarea>' +
        '</div>' +
        '<div class="decision-field">' +
          '<label>Comments</label>' +
          '<textarea data-field="comments" placeholder="Optional comments or context...">' + escapeHtml(comments || "") + '</textarea>' +
        '</div>' +
      '</div>' +
    '</div>';

  // Bind input listeners
  var decTA = panel.querySelector("textarea[data-field='final_decision']");
  var comTA = panel.querySelector("textarea[data-field='comments']");
  if (decTA) {
    decTA.addEventListener("input", function() {
      drafts[selectedId + "_decision"] = this.value;
      this.classList.toggle("filled", this.value.trim().length > 0);
      renderList();
      updateStats();
    });
  }
  if (comTA) {
    comTA.addEventListener("input", function() {
      drafts[selectedId + "_comments"] = this.value;
    });
  }
}

function selectIssue(id) {
  saveDraftsForCurrent();
  selectedId = id;
  renderList();
  renderDetail();
}

function toggleSample(issueId) {
  var body = document.getElementById("sample-body");
  var btn = document.getElementById("sample-toggle-btn");
  if (!body || !btn) return;

  var wasHidden = !body.classList.contains("visible");
  body.classList.toggle("visible");
  btn.classList.toggle("expanded");

  // Fetch data on first expand if not already cached
  if (wasHidden && issueId) {
    var issue = reportData.issues.find(function(i) { return i.id === issueId; });
    if (issue && issue.sample_table) {
      var cache = sampleCache[issueId];
      if (!cache || cache.columns.length === 0) {
        fetchSampleData(issueId, issue.sample_table, 0, null, "asc", false);
      } else {
        renderSampleGrid(issueId);
      }
    }
  }
}

function updateStats() {
  if (!reportData || !reportData.issues) return;
  var total = reportData.issues.length;
  var filled = 0;
  reportData.issues.forEach(function(issue) {
    var d = getDecision(issue);
    if (d && d.trim().length > 0) filled++;
  });
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-open").textContent = total - filled;
  document.getElementById("stat-decided").textContent = filled;
  document.getElementById("footer-hint").textContent = filled + " of " + total + " issues have decisions";
}

function escapeHtml(str) {
  var div = document.createElement("div");
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

// ── Actions ──
async function handleSave() {
  var btn = document.getElementById("btn-save");
  btn.disabled = true;
  btn.textContent = "Saving...";
  var ok = await saveReportData();
  btn.disabled = false;
  btn.textContent = "Save Draft";
  showToast(ok ? "Draft saved to project." : "Failed to save.", !ok);
}

async function handleFinalise() {
  var btn = document.getElementById("btn-finalise");
  btn.disabled = true;
  btn.textContent = "Finalising...";

  var saved = await saveReportData();
  if (!saved) {
    btn.disabled = false;
    btn.textContent = "Finalise & Submit";
    showToast("Failed to save report data.", true);
    return;
  }

  var committed = await commitAndPush();
  if (!committed) {
    btn.disabled = false;
    btn.textContent = "Finalise & Submit";
    showToast("Saved but failed to commit. Try again.", true);
    return;
  }

  var total = reportData.issues.length;
  var decided = 0;
  reportData.issues.forEach(function(i) {
    if (i.final_decision && i.final_decision.trim()) decided++;
  });
  var summary = "Validation report updated \u2014 " + decided + "/" + total + " issues decided.";
  await postChatMessage(summary);

  btn.disabled = false;
  btn.textContent = "Finalise & Submit";
  showToast("Finalised \u2014 committed, pushed, and posted to chat.");
}

function showToast(text, isError) {
  var toast = document.getElementById("toast");
  document.getElementById("toast-text").textContent = text;
  toast.classList.toggle("error", !!isError);
  toast.querySelector(".material-symbols-outlined").textContent = isError ? "error" : "check_circle";
  toast.classList.add("visible");
  setTimeout(function() { toast.classList.remove("visible"); }, 3000);
}

// ── postMessage listener ──
window.addEventListener("message", function(e) {
  if (!e.data || typeof e.data !== "object") return;

  if (e.data.type === "theme") {
    applyTheme(e.data.theme);
  }

  if (e.data.type === "context") {
    var needsFetch = !ctx.projectId && e.data.projectId;
    ctx.chatId = e.data.chatId || null;
    ctx.projectId = e.data.projectId || null;
    ctx.filePath = e.data.filePath || null;
    if (needsFetch) fetchReportData();
  }
});
</script>
